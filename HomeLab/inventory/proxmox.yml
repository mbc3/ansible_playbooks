---
# ansible-inventory -i proxmox.yml --vault-id @prompt --list
# ansible-inventory -i proxmox.yml --ask-vault-pass --list
# ansible-inventory -i proxmox.yml --vault-password-file .vault --list
plugin: community.proxmox.proxmox
url: https://services.localdomain:8006
user: ansible@pve
token_id: ansible
token_secret: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          32353936353635616132653964616333363163616365623466343536396435393837363763386166
          3637363763376332343631303962616465303531633930640a343761386261613733313665313039
          32333666386134313031616539363333356336363739323138653535373031316162386431613635
          3163666563363231610a626165393837636363313631326661383961633364636366373331313036
          36316633343837383934623363396632653065336666376663323535623364363830616530666565
          6432393761643736306564336266333162663463653834663333
validate_certs: true # if tls isn't working, set to false
want_facts: true
want_proxmox_nodes_ansible_host: true
compose:
