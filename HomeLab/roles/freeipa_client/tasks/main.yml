---
- name: Install FreeIPA client and necessary packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ freeipa_client_packages }}"

- name: Set hostname to be FQDN
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}.{{ domain }}"
    use: systemd
  when: inventory_hostname != "freeipa"


- name: RHEL tasks for lxc containers
  when:
    - ansible_facts["distribution"] != "Debian"
    - '"proxmox_all_lxc" in group_names'
  block:
    - name: Have containers start chrony with the -x flag (RHEL)
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/chronyd
        regexp: "^OPTIONS"
        line: 'OPTIONS="-F 2 -x"'
        state: present
      notify: Restart chrony

    - name: Chrony restart (RHEL)
      ansible.builtin.systemd_service:
        name: chronyd
        daemon_reload: true
        state: restarted

- name: Deb tasks for lxc containers
  when:
    - ansible_facts["distribution"] == "Debian"
    - '"proxmox_all_lxc" in group_names'
  block:
    - name: Have containers start chrony with the -x flag (Deb)
      ansible.builtin.lineinfile:
        path: /etc/default/chrony
        regexp: "^DAEMON_OPTS"
        line: 'DAEMON_OPTS="-F 1 -x"'
        state: present
      notify: Restart chrony
      when:
        - ansible_facts["distribution"] == "Debian"
        - '"proxmox_all_lxc" in group_names'

    - name: Chrony restart (Deb)
      ansible.builtin.systemd_service:
        name: chrony
        daemon_reload: true
        state: restarted

- name: Check if FreeIPA user exists
  ansible.builtin.user:
    name: mbc
  check_mode: true
  register: freeipa_client_user_check

- name: Bind to FreeIPA domain
  become: true
  ansible.builtin.expect:
    command: ipa-client-install --mkhomedir
    timeout: 600
    responses:
      "Provide the domain name of your IPA server":
        - "{{ freeipa_client_domain }}"
      "Provide your IPA server name":
        - "{{ freeipa_client_fqdn }}"
      "Proceed with fixed values and no DNS discovery":
        - "yes" # this is to disable dns auto discovery
      "Do you want to configure chrony with NTP server or pool address":
        - "no" # this is for chrony
      "Continue to configure the system with these values":
        - "yes" # confirms config
      "User authorized to enroll computers":
        - "{{ freeipa_client_admin_account }}"
      "Password for":
        - "{{ vault_freeipa_admin_password }}"
  no_log: false
  when: freeipa_client_user_check.state is not defined

- name: Allow FreeIPA user in sudoers
  community.general.sudoers:
    name: "{{ freeipa_username }}"
    state: present
    user: "{{ freeipa_username }}"
    commands: ALL
    host: ALL
    nopassword: false

- name: Switch user to create home dir
  become: true
  ansible.builtin.command: su {{ freeipa_username }}
  changed_when: false

- name: Copy MBC SSH key
  ansible.posix.authorized_key:
    state: present
    user: "{{ freeipa_username }}"
    key: "{{ mbc_pub_key }}"
