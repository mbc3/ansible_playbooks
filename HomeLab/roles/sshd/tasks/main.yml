- name: Copy allow-users config
  ansible.builtin.template:
    src: 69-allow-users.j2
    dest: /etc/ssh/sshd_config.d/69-allow-users.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart SSHD

- name: Remove old misc sshd config
  ansible.builtin.file:
    name: /etc/ssh/sshd_config.d/69-sshd-config.conf
    state: absent

- name: Copy misc sshd config
  ansible.builtin.copy:
    src: 16-sshd-config.conf
    dest: /etc/ssh/sshd_config.d/
    owner: root
    group: root
    mode: "0644"
  notify: Restart SSHD

- name: Copy Proxmox SSH key for ansible user
  ansible.posix.authorized_key:
    user: ansible
    state: present
    key: "{{ proxmox_pub_key }}"

- name: Remove MBC SSH key from Ansible service account
  ansible.posix.authorized_key:
    user: ansible
    state: absent
    key: "{{ mbc_pub_key }}"
