---
on:
  push:
    branches:
      - main
env: ANSIBLE_PROXMOX_VAULT_PASSWORD:${{ secrets.ANSIBLE_PROXMOX_VAULT_PASSWORD }}
jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Minimum linter
        run: ansible-lint --profile=min
      - name: Inventory check
        run: ansible-inventory --graph
        working-directory: ./HomeLab
